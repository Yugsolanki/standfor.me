app_env: development

server:
  host: localhost
  port: 8080
  read_timeout: 10s
  write_timeout: 15s
  shutdown_timeout: 30s
  request_timeout: 30s

worker:
  concurrency: 20

database:
  host: localhost
  # password intentionally omitted
  port: 5432
  user: postgres
  dbname: standfor_dev
  sslmode: disable
  max_open_conns: 10
  max_idle_conns: 5
  max_conn_lifetime: 5m
  max_conn_idle_time: 1m
  health_check_interval: 30s

redis:
  addr: localhost:6379
  # password intentionally omitted
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s
  pool_size: 10

jwt:
  # secret intentionally omitted
  access_token_ttl: 15m
  refresh_token_ttl: 168h
  issuer: standfor.me

rate_limit:
  global:
    limit: 100
    window: 1m