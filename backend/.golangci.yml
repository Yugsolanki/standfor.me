version: "2"
run:
  # Maximum time the linter is allowed to run
  timeout: 5m
  # Only check code in these directories
  tests: true

linters:
  default: none
  enable:
    - errcheck      # Ensures you handle all errors (Go's most important practice)
    - modernize      # Suggests simpler ways to write code
    - govet         # Reports suspicious constructs (like Printf format mismatches)
    - ineffassign   # Detects when you assign to a variable but never use it
    - staticcheck   # Advanced static analysis for bugs
    - unused        # Finds unused variables, functions, etc.
    - misspell      # Catches spelling mistakes in comments and strings
    - revive         # Enforces style rules (like error message formatting)
    - gosec          # Detects security issues in code
    - bodyclose      # Checks that HTTP response bodies are closed
    - nilerr          # Detects when you return nil instead of an error
  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    govet:
      enable:
        - shadow
    revive:
      rules:
        - name: blank-imports
          disabled: true

formatters:
  enable:
    - gofumpt
    - swaggo