  /api/v1/search/movements:
    get:
      consumes:
      - application/json
      description: Search and filter movements by query, categories, verification
        tiers, organization status, and popularity metrics. Returns paginated results
        with engagement and depth-of-commitment metrics.
      parameters:
      - description: Full-text search query (matches name, description)
        in: query
        name: q
        type: string
      - description: Filter by movement status
        enum:
        - draft
        - active
        - archived
        - rejected
        - pending_review
        in: query
        name: status
        type: string
      - description: Filter by organization ID
        in: query
        name: org_id
        type: string
      - description: Sort field
        enum:
        - name
        - supporter_count
        - trending_score
        - avg_verification_tier
        - created_at
        in: query
        name: sort_by
        type: string
      - description: Sort order
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Results per page
        in: query
        name: per_page
        type: integer
      - collectionFormat: multi
        description: Filter by category IDs (comma-separated or multiple params)
        in: query
        items:
          type: string
        name: category_ids
        type: array
      - collectionFormat: multi
        description: Filter by category slugs (comma-separated or multiple params)
        in: query
        items:
          type: string
        name: category_slugs
        type: array
      - collectionFormat: multi
        description: Filter by category names (comma-separated or multiple params)
        in: query
        items:
          type: string
        name: category_names
        type: array
      - description: Filter movements claimed by verified organizations
        in: query
        name: has_verified_org
        type: boolean
      - description: Filter by exact verified supporter count
        in: query
        name: verified_supporter_count
        type: integer
      - description: Filter by exact unverified supporter count
        in: query
        name: unverified_supporters
        type: integer
      - description: Minimum average verification tier (0-5)
        in: query
        name: min_avg_vt
        type: number
      - description: Maximum average verification tier (0-5)
        in: query
        name: max_avg_vt
        type: number
      - description: Minimum minimum verification tier (0-5)
        in: query
        name: min_min_vt
        type: integer
      - description: Minimum maximum verification tier (0-5)
        in: query
        name: min_max_vt
        type: integer
      - description: Minimum maximum badge level (0-5, 1=bronze,5=diamond)
        in: query
        name: min_max_badge
        type: integer
      - description: Minimum total supporter count
        in: query
        name: min_supporters
        type: integer
      - description: Minimum trending score
        in: query
        name: min_trending
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved search results
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
